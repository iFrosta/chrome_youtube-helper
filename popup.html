<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Helper</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>YouTube Helper</h1>
        </header>

        <main class="content">
            <!-- Extension Status -->
            <section class="status-section">
                <div class="status-item">
                    <span class="status-label">Status</span>
                    <span id="extension-status" class="status-badge active">Active</span>
                </div>
                <button id="toggle-extension" class="btn btn-secondary">Pause for this page</button>
            </section>

            <!-- What's hidden -->
            <section>
                <h3>Hidden on YouTube</h3>
                <ul class="features-list">
                    <li>Shorts (sections &amp; individual items)</li>
                    <li>Home feed recommendations</li>
                    <li>Watch page sidebar suggestions</li>
                    <li>Home button in sidebar</li>
                    <li>Blacklisted videos</li>
                </ul>
            </section>

            <!-- Statistics -->
            <section>
                <h3>Statistics</h3>
                <div class="stats-grid">
                    <div class="stat-item">
                        <span class="stat-number" id="blacklisted-count">0</span>
                        <span class="stat-label">Blacklisted this session</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-number" id="blacklist-total">0</span>
                        <span class="stat-label">Total in blacklist</span>
                    </div>
                </div>
            </section>

            <!-- Blacklist Management -->
            <section>
                <h3>Blacklist</h3>
                <div class="blacklist-controls">
                    <button id="export-blacklist" class="btn btn-secondary">Export</button>
                    <button id="import-blacklist" class="btn btn-secondary">Import</button>
                    <button id="clear-blacklist" class="btn btn-danger">Clear All</button>
                </div>
                <input type="file" id="import-file" accept=".json" style="display: none;">
            </section>
        </main>

        <footer class="footer">
            <button id="process-page" class="link-btn">Re-process page</button>
        </footer>
    </div>

    <script src="popup.js"></script>
</body>
</html>
